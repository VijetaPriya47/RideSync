version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=ride-sharing
    volumes:
      - mongodb_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  jaeger:
    image: jaegertracing/all-in-one:1.35
    container_name: jaeger
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ridesync
      POSTGRES_PASSWORD: ridesync
      POSTGRES_DB: ridesync
    volumes:
      - postgres_data:/var/lib/postgresql/data

  finance-service:
    build:
      context: .
      dockerfile: infra/development/docker/finance-service.Dockerfile
    container_name: finance-service
    environment:
      - DATABASE_URL=postgres://ridesync:ridesync@postgres:5432/ridesync?sslmode=disable
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - GRPC_ADDR=:9094
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - ENVIRONMENT=development
    depends_on:
      - postgres
      - rabbitmq
      - jaeger

  user-auth-service:
    build:
      context: .
      dockerfile: infra/development/docker/user-auth-service.Dockerfile
    container_name: user-auth-service
    environment:
      - DATABASE_URL=postgres://ridesync:ridesync@postgres:5432/ridesync?sslmode=disable
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - GRPC_ADDR=:9095
      - JWT_SECRET=dev-insecure-change-me
      - JWT_ISSUER=ridesync-auth
      - JWT_AUDIENCE=ridesync-gateway
      - SUPER_ADMIN_EMAIL=vijeta.admin@ridesync.com
      - SUPER_ADMIN_PASSWORD=change-me
      - GOOGLE_CLIENT_ID=
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - ENVIRONMENT=development
      - PUBLIC_GATEWAY_URL=http://localhost:8081
    depends_on:
      - postgres
      - rabbitmq
      - jaeger

  api-gateway:
    build:
      context: .
      dockerfile: infra/development/docker/api-gateway.Dockerfile
    container_name: api-gateway
    ports:
      - "8081:8081"
    environment:
      - HTTP_ADDR=:8081
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - ENVIRONMENT=development
      - TRIP_SERVICE_URL=trip-service:8080
      - FINANCE_SERVICE_URL=finance-service:9094
      - USER_AUTH_SERVICE_URL=user-auth-service:9095
      - JWT_SECRET=dev-insecure-change-me
      - JWT_ISSUER=ridesync-auth
      - JWT_AUDIENCE=ridesync-gateway
    depends_on:
      - rabbitmq
      - jaeger
      - finance-service
      - user-auth-service
      - trip-service

  trip-service:
    build:
      context: .
      dockerfile: infra/development/docker/trip-service.Dockerfile
    container_name: trip-service
    ports:
      - "9093:9093"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ride-sharing
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - OSRM_API=http://router.project-osrm.org
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - ENVIRONMENT=development
      - DRIVER_SERVICE_URL=driver-service:8080
    depends_on:
      - mongodb
      - rabbitmq
      - jaeger
      - driver-service

  driver-service:
    build:
      context: .
      dockerfile: infra/development/docker/driver-service.Dockerfile
    container_name: driver-service
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/ride-sharing
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - ENVIRONMENT=development
    depends_on:
      - mongodb
      - rabbitmq
      - jaeger

  payment-service:
    build:
      context: .
      dockerfile: infra/development/docker/payment-service.Dockerfile
    container_name: payment-service
    environment:
      - STRIPE_SECRET_KEY=<STRIPE_SECRET_KEY>
      - STRIPE_WEBHOOK_KEY=<STRIPE_WEBHOOK_KEY>
      - RABBITMQ_URI=amqp://guest:guest@rabbitmq:5672/
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - ENVIRONMENT=development
    depends_on:
      - rabbitmq
      - jaeger

  web:
    build:
      context: .
      dockerfile: infra/development/docker/web.Dockerfile
    container_name: web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8081
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=
    depends_on:
      - api-gateway

volumes:
  mongodb_data:
  postgres_data:
