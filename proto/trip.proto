syntax = "proto3";

package trip;

option go_package = "shared/proto/trip;trip";

service TripService {
  rpc PreviewTrip(PreviewTripRequest) returns (PreviewTripResponse);
  rpc CreateTrip(CreateTripRequest) returns (CreateTripResponse);
  rpc IncreaseTripFare(IncreaseTripFareRequest) returns (IncreaseTripFareResponse);
  rpc GetTrip(GetTripRequest) returns (GetTripResponse);
  rpc UpdateFareSeats(UpdateFareSeatsRequest) returns (UpdateFareSeatsResponse);
  rpc ListMyTrips(ListMyTripsRequest) returns (ListMyTripsResponse);
}

message PreviewTripRequest {
  string userID = 1;
  Coordinate startLocation = 2;
  Coordinate endLocation = 3;
  int32 requestedSeats = 4;
}

message PreviewTripResponse {
  string tripID = 1;
  Route route = 2;
  repeated RideFare rideFares = 3;
}

message Coordinate {
  double latitude = 1;
  double longitude = 2;
}

message Geometry {
  repeated Coordinate coordinates = 1;
}

message Route {
  repeated Geometry geometry = 1;
  double distance = 2;
  double duration = 3;
}

message RideFare {
  string id = 1;
  string userID = 2;
  string packageSlug = 3;
  double totalPriceInCents = 4;
  int32 requestedSeats = 5;
}

message CreateTripRequest {
  string rideFareID = 1;
  string userID = 2;
}

message CreateTripResponse {
  string tripID = 1;
  Trip trip = 2;
}

message Trip {
  string id = 1;
  RideFare selectedFare = 2;
  Route route = 3;
  string status = 4;
  string userID = 5;
  TripDriver driver = 6;
}

message TripDriver {
  string id = 1;
  string name = 2;
  string profilePicture = 3;
  string carPlate = 4;
}

message IncreaseTripFareRequest {
  string tripID = 1;
  string userID = 2;
  double totalPriceInCents = 3;
}

message IncreaseTripFareResponse {
  Trip trip = 1;
}

message GetTripRequest {
  string trip_id = 1;
}

message GetTripResponse {
  Trip trip = 1;
}

message UpdateFareSeatsRequest {
  string fare_id = 1;
  int32 seats = 2;
}

message UpdateFareSeatsResponse {}

message ListMyTripsRequest {
  string user_id = 1;
  int32 limit = 2;
}

// Slim row for ride history (no full route geometry).
message RideHistoryEntry {
  string trip_id = 1;
  // "rider" if user booked the trip; "driver" if user accepted as driver.
  string role = 2;
  string status = 3;
  string when_rfc3339 = 4;
  double fare_total_cents = 5;
  string package_slug = 6;
  // e.g. driver name when role is rider; short label when role is driver.
  string other_party_label = 7;
}

message ListMyTripsResponse {
  repeated RideHistoryEntry entries = 1;
}
